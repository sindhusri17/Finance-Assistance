<!DOCTYPE html>
<html>
<head>
<title>Finance Assistant Login</title>
<style>
body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.login-box{
background:white;
width:350px;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
animation: fadeIn 1s ease-in-out;
}
.icon{
font-size:60px;
}
h1{
color:#2563eb;
margin-bottom:5px;
}
.subtitle{
color:gray;
margin-bottom:25px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
box-sizing:border-box;
}
.password-box{
position:relative;
}
.password-box span{
position:absolute;
right:15px;
top:22px;
cursor:pointer;
font-size:18px;
}
button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#1e40af;
}
.footer{
margin-top:20px;
font-size:13px;
color:gray;
}
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>
<div class="login-box">
<div class="icon">
💰
</div>
<h1>Finance Assistant</h1>
<h3>Welcome Back 👋</h3>
<p class="subtitle">
Smart Expense Tracking & Budget Planning
</p>
<form action="/login" method="POST">
<input type="email"
name="email"
placeholder="Enter Email"
required>
<div class="password-box">
<input type="password"
id="password"
name="password"
placeholder="Enter Password"
required>
<span onclick="togglePassword()">
👁️
</span>
</div>
<button type="submit">
Login
</button>
</form>
<div class="footer">
Internship Project 2026
</div>
</div>
</body>

</html>
